<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Insighta — Authenticating…</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #1a1a2e; color: #fff;
      flex-direction: column; gap: 1rem;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #aaa; font-size: 0.9rem; }
    .error { color: #f87171; text-align: center; max-width: 400px; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p id="msg">Completing login…</p>

  <script type="module">
    import { Auth, BACKEND } from './js/auth.js';

    async function handleCallback() {
      const params  = new URLSearchParams(window.location.search);
      const token   = params.get('token');
      const refresh = params.get('refresh_token');
      const error   = params.get('error');

      if (error) {
        document.getElementById('msg').className = 'error';
        document.getElementById('msg').textContent = `Login failed: ${error}`;
        return;
      }

      // Backend sets tokens as query params for web flow when redirect_uri is provided.
      if (token && refresh) {
        Auth.save({ access_token: token, refresh_token: refresh });

        // Fetch user info to store username and role locally.
        try {
          const resp = await fetch(`${BACKEND}/auth/me`, {
            headers: {
              'Authorization': `Bearer ${token}`,
              'X-API-Version': '1',
            },
          });
          if (resp.ok) {
            const json = await resp.json();
            Auth.save({
              access_token:  token,
              refresh_token: refresh,
              username: json.data.username,
              role:     json.data.role,
            });
          }
        } catch {}

        window.location.href = '/dashboard.html';
        return;
      }

      document.getElementById('msg').className = 'error';
      document.getElementById('msg').textContent =
        'Authentication failed — no token received. Please try again.';

      setTimeout(() => { window.location.href = '/index.html'; }, 3000);
    }

    handleCallback();
  </script>
</body>
</html>
