<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Insighta Labs+</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a2e; }
    main { max-width: 800px; margin: 2rem auto; padding: 0 1.5rem; }
    .back-link { display: inline-block; margin-bottom: 1.25rem; color: #666; font-size: 0.875rem; text-decoration: none; }
    .card { background: #fff; border-radius: 14px; padding: 2rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .profile-header { display: flex; align-items: center; gap: 1.25rem; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid #f0f0f0; }
    .avatar { width: 60px; height: 60px; background: #4361ee; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.75rem; font-weight: 700; flex-shrink: 0; }
    h1 { font-size: 1.5rem; font-weight: 700; }
    .id { font-size: 0.78rem; color: #bbb; font-family: monospace; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; }
    .field { display: flex; flex-direction: column; gap: 0.4rem; }
    .field label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #999; }
    .field-value { font-size: 0.95rem; color: #1a1a2e; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 500; }
    .badge-male { background: #e8f4fd; color: #2779bd; }
    .badge-female { background: #fde8f4; color: #bd2779; }
    .muted { color: #aaa; font-size: 0.85em; }
    .empty { color: #999; padding: 2rem 0; }
  </style>
</head>
<body>
  <main>
    <a href="/profiles.html" class="back-link">← Back to Profiles</a>
    <div class="card" id="content"><p class="empty">Loading…</p></div>
  </main>

  <script type="module">
    import { Auth } from './js/auth.js';
    import { API }  from './js/api.js';
    import { renderNav, navCSS } from './js/nav.js';

    if (!Auth.requireAuth()) throw new Error('not authed');

    const style = document.createElement('style');
    style.textContent = navCSS;
    document.head.appendChild(style);
    renderNav();

    const id = new URLSearchParams(location.search).get('id');
    if (!id) { location.href = '/profiles.html'; }

    async function load() {
      try {
        const resp = await API.getProfile(id);
        const p = resp.data;
        document.title = `${p.name} — Insighta Labs+`;
        document.getElementById('content').innerHTML = `
          <div class="profile-header">
            <div class="avatar">${p.name.charAt(0).toUpperCase()}</div>
            <div>
              <h1>${p.name}</h1>
              <span class="id">${p.id}</span>
            </div>
          </div>
          <div class="grid">
            <div class="field">
              <label>Gender</label>
              <div class="field-value">
                <span class="badge badge-${p.gender}">${p.gender}</span>
                <span class="muted">${(p.gender_probability * 100).toFixed(1)}% confidence · ${p.sample_size.toLocaleString()} samples</span>
              </div>
            </div>
            <div class="field">
              <label>Age</label>
              <div class="field-value">${p.age} years <span class="muted">(${p.age_group})</span></div>
            </div>
            <div class="field">
              <label>Country</label>
              <div class="field-value">${p.country_name} <span class="muted">(${p.country_id} · ${(p.country_probability * 100).toFixed(1)}% confidence)</span></div>
            </div>
            <div class="field">
              <label>Created</label>
              <div class="field-value">${new Date(p.created_at).toLocaleString()}</div>
            </div>
          </div>`;
      } catch (e) {
        document.getElementById('content').innerHTML = `<p class="empty">${e.message}</p>`;
      }
    }

    load();
  </script>
</body>
</html>
