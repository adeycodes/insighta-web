<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Insighta Labs+</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a2e; }
    main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
    .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2.5rem; }
    h1 { font-size: 1.75rem; font-weight: 700; }
    .greeting { color: #666; margin-top: 0.25rem; }
    .stat-card { background: #1a1a2e; color: #fff; padding: 1rem 1.5rem; border-radius: 12px; text-align: right; }
    .stat-value { font-size: 1.75rem; font-weight: 700; display: block; }
    .stat-label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
    .section { background: #fff; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .section-head h2 { font-size: 1rem; font-weight: 600; }
    .section-head a { color: #4361ee; font-size: 0.875rem; text-decoration: none; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; padding: 0.5rem 0.75rem 0.75rem; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #999; border-bottom: 1px solid #f0f0f0; }
    td { padding: 0.75rem; border-bottom: 1px solid #f8f8f8; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 500; }
    .badge-male { background: #e8f4fd; color: #2779bd; }
    .badge-female { background: #fde8f4; color: #bd2779; }
    .muted { color: #aaa; font-size: 0.85em; }
    .link-btn { color: #4361ee; font-size: 0.85rem; text-decoration: none; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 1rem; }
    .action-card { display: flex; flex-direction: column; gap: 0.25rem; padding: 1.25rem; border: 1px solid #eee; border-radius: 10px; text-decoration: none; transition: border-color 0.15s; }
    .action-card:hover { border-color: #4361ee; }
    .action-card .icon { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .action-card strong { font-size: 0.9rem; color: #1a1a2e; }
    .action-card span { font-size: 0.8rem; color: #888; }
    .empty { color: #999; font-size: 0.9rem; padding: 1rem 0; }
  </style>
</head>
<body>
  <main>
    <div class="page-header">
      <div>
        <h1>Dashboard</h1>
        <p class="greeting" id="greeting">Welcome back</p>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="total-count">—</span>
        <span class="stat-label">Total profiles</span>
      </div>
    </div>

    <div class="section">
      <div class="section-head">
        <h2>Recently Added</h2>
        <a href="/profiles.html">View all →</a>
      </div>
      <div id="recent-table"><p class="empty">Loading…</p></div>
    </div>

    <div class="section">
      <h2 style="margin-bottom:1rem">Quick Actions</h2>
      <div class="grid">
        <a href="/profiles.html" class="action-card">
          <span class="icon">📋</span>
          <strong>Browse Profiles</strong>
          <span>Filter, sort, paginate</span>
        </a>
        <a href="/search.html" class="action-card">
          <span class="icon">🔍</span>
          <strong>Natural Language Search</strong>
          <span>Try "young males from Nigeria"</span>
        </a>
        <a href="/account.html" class="action-card">
          <span class="icon">👤</span>
          <strong>My Account</strong>
          <span id="role-hint">View your role</span>
        </a>
      </div>
    </div>
  </main>

  <script type="module">
    import { Auth } from './js/auth.js';
    import { API }  from './js/api.js';
    import { renderNav, navCSS } from './js/nav.js';

    if (!Auth.requireAuth()) throw new Error('not authed');

    const style = document.createElement('style');
    style.textContent = navCSS;
    document.head.appendChild(style);
    renderNav();

    document.getElementById('greeting').textContent = `Welcome back, @${Auth.getUsername()}`;
    document.getElementById('role-hint').textContent = `Role: ${Auth.getRole()}`;

    async function load() {
      try {
        const data = await API.listProfiles({ limit: 5, sort_by: 'created_at', order: 'desc' });
        document.getElementById('total-count').textContent = data.total.toLocaleString();

        if (!data.data.length) {
          document.getElementById('recent-table').innerHTML = '<p class="empty">No profiles yet.</p>';
          return;
        }

        const rows = data.data.map(p => `
          <tr>
            <td>${p.name}</td>
            <td><span class="badge badge-${p.gender}">${p.gender}</span></td>
            <td>${p.age} <span class="muted">(${p.age_group})</span></td>
            <td>${p.country_name}</td>
            <td>${(p.gender_probability * 100).toFixed(0)}%</td>
            <td><a href="/profile.html?id=${p.id}" class="link-btn">View</a></td>
          </tr>`).join('');

        document.getElementById('recent-table').innerHTML = `
          <table>
            <thead><tr><th>Name</th><th>Gender</th><th>Age</th><th>Country</th><th>Confidence</th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>`;
      } catch (e) {
        document.getElementById('recent-table').innerHTML = `<p class="empty">${e.message}</p>`;
      }
    }

    load();
  </script>
</body>
</html>
