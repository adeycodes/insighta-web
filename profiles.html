<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profiles — Insighta Labs+</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a2e; }
    main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
    .page-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 700; }
    .count { color: #999; font-weight: 400; font-size: 1rem; }
    .card { background: #fff; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
    label { display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.8rem; font-weight: 500; color: #666; }
    label select, label input { padding: 0.5rem 0.75rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.875rem; background: #fff; }
    .filter-actions { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
    .btn { padding: 0.5rem 1.125rem; border-radius: 8px; font-size: 0.875rem; font-weight: 500; cursor: pointer; border: none; text-decoration: none; display: inline-flex; align-items: center; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #4361ee; color: #fff; }
    .btn-secondary { background: #1a1a2e; color: #fff; }
    .btn-ghost { background: none; border: 1px solid #ddd; color: #555; }
    .btn-danger { background: none; border: none; color: #e74c3c; font-size: 0.8rem; cursor: pointer; padding: 0; font-family: inherit; }
    .create-form { margin-bottom: 1.25rem; }
    .create-form h2 { font-size: 1rem; margin-bottom: 1rem; }
    .field-row { display: flex; gap: 0.75rem; }
    .field-row input { flex: 1; padding: 0.6rem 0.875rem; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; }
    .hint { color: #999; font-size: 0.8rem; margin-top: 0.5rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; padding: 0.5rem 0.75rem 0.75rem; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #999; border-bottom: 1px solid #f0f0f0; }
    td { padding: 0.75rem; border-bottom: 1px solid #f8f8f8; color: #333; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 500; }
    .badge-male { background: #e8f4fd; color: #2779bd; }
    .badge-female { background: #fde8f4; color: #bd2779; }
    .muted { color: #aaa; font-size: 0.85em; }
    .link-btn { font-size: 0.8rem; color: #4361ee; text-decoration: none; }
    .actions-cell { display: flex; gap: 0.75rem; align-items: center; }
    .pagination { display: flex; align-items: center; justify-content: center; gap: 1.5rem; margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid #f0f0f0; }
    .page-btn { background: none; border: 1px solid #ddd; padding: 0.4rem 0.875rem; border-radius: 6px; font-size: 0.85rem; cursor: pointer; }
    .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .page-info { font-size: 0.85rem; color: #777; }
    .empty { color: #999; text-align: center; padding: 2rem; }
    .alert { padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; }
    .alert-error { background: #fde8e8; color: #c0392b; }
    .alert-success { background: #e8fde8; color: #27ae60; }
  </style>
</head>
<body>
  <main>
    <div class="page-top">
      <h1>Profiles <span class="count" id="count"></span></h1>
      <div id="admin-actions"></div>
    </div>

    <div id="alert"></div>
    <div id="create-form-wrap"></div>

    <div class="card">
      <div class="filter-grid">
        <label>Gender
          <select id="f-gender">
            <option value="">All</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </label>
        <label>Age Group
          <select id="f-age-group">
            <option value="">All</option>
            <option value="child">Child</option>
            <option value="teenager">Teenager</option>
            <option value="adult">Adult</option>
            <option value="senior">Senior</option>
          </select>
        </label>
        <label>Country Code
          <input id="f-country" type="text" placeholder="e.g. NG" maxlength="2" />
        </label>
        <label>Sort By
          <select id="f-sort">
            <option value="created_at">Date Added</option>
            <option value="age">Age</option>
            <option value="gender_probability">Confidence</option>
          </select>
        </label>
        <label>Order
          <select id="f-order">
            <option value="desc">Descending</option>
            <option value="asc">Ascending</option>
          </select>
        </label>
        <label>Per page
          <select id="f-limit">
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50">50</option>
          </select>
        </label>
      </div>
      <div class="filter-actions">
        <button class="btn btn-secondary" id="apply-btn">Apply Filters</button>
        <button class="btn btn-ghost" id="reset-btn">Reset</button>
        <button class="btn btn-ghost" id="export-btn">↓ Export CSV</button>
      </div>
    </div>

    <div class="card" id="table-wrap">
      <p class="empty">Loading…</p>
    </div>
  </main>

  <script type="module">
    import { Auth } from './js/auth.js';
    import { API }  from './js/api.js';
    import { renderNav, navCSS } from './js/nav.js';

    if (!Auth.requireAuth()) throw new Error('not authed');

    const style = document.createElement('style');
    style.textContent = navCSS;
    document.head.appendChild(style);
    renderNav();

    const isAdmin = Auth.isAdmin();
    let currentPage = 1;

    if (isAdmin) {
      document.getElementById('admin-actions').innerHTML =
        `<button class="btn btn-primary" id="new-btn">+ New Profile</button>`;
      document.getElementById('new-btn').addEventListener('click', toggleCreateForm);
    }

    function toggleCreateForm() {
      const wrap = document.getElementById('create-form-wrap');
      if (wrap.innerHTML) { wrap.innerHTML = ''; return; }
      wrap.innerHTML = `
        <div class="card create-form">
          <h2>Create Profile</h2>
          <div class="field-row">
            <input type="text" id="new-name" placeholder="Enter a name e.g. Amara Okonkwo" />
            <button class="btn btn-primary" id="create-submit">Create</button>
          </div>
          <p class="hint">Gender, age, and country will be enriched automatically.</p>
        </div>`;
      document.getElementById('create-submit').addEventListener('click', createProfile);
    }

    async function createProfile() {
      const name = document.getElementById('new-name').value.trim();
      if (!name) return;
      try {
        document.getElementById('create-submit').textContent = 'Creating…';
        await API.createProfile(name);
        showAlert('Profile created successfully.', 'success');
        document.getElementById('create-form-wrap').innerHTML = '';
        load();
      } catch (e) {
        showAlert(e.message, 'error');
      }
    }

    function getFilters() {
      return {
        gender:    document.getElementById('f-gender').value,
        age_group: document.getElementById('f-age-group').value,
        country_id: document.getElementById('f-country').value,
        sort_by:   document.getElementById('f-sort').value,
        order:     document.getElementById('f-order').value,
        limit:     document.getElementById('f-limit').value,
        page:      currentPage,
      };
    }

    async function load() {
      document.getElementById('table-wrap').innerHTML = '<p class="empty">Loading…</p>';
      try {
        const filters = getFilters();
        // Remove empty values
        Object.keys(filters).forEach(k => !filters[k] && delete filters[k]);

        const data = await API.listProfiles(filters);
        document.getElementById('count').textContent = `(${data.total.toLocaleString()})`;

        if (!data.data.length) {
          document.getElementById('table-wrap').innerHTML = '<p class="empty">No profiles match your filters.</p>';
          return;
        }

        const rows = data.data.map(p => `
          <tr>
            <td><a href="/profile.html?id=${p.id}" class="link-btn" style="font-weight:500;color:#1a1a2e">${p.name}</a></td>
            <td><span class="badge badge-${p.gender}">${p.gender}</span></td>
            <td>${p.age} <span class="muted">(${p.age_group})</span></td>
            <td>${p.country_name} <span class="muted">(${p.country_id})</span></td>
            <td>${(p.gender_probability * 100).toFixed(0)}%</td>
            <td class="actions-cell">
              <a href="/profile.html?id=${p.id}" class="link-btn">View</a>
              ${isAdmin ? `<button class="btn-danger" data-id="${p.id}" data-name="${p.name}">Delete</button>` : ''}
            </td>
          </tr>`).join('');

        document.getElementById('table-wrap').innerHTML = `
          <table>
            <thead><tr><th>Name</th><th>Gender</th><th>Age</th><th>Country</th><th>Confidence</th><th>Actions</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <div class="pagination">
            <button class="page-btn" id="prev-btn" ${data.page <= 1 ? 'disabled' : ''}>← Prev</button>
            <span class="page-info">Page ${data.page} of ${data.total_pages}</span>
            <button class="page-btn" id="next-btn" ${data.page >= data.total_pages ? 'disabled' : ''}>Next →</button>
          </div>`;

        document.getElementById('prev-btn')?.addEventListener('click', () => { currentPage--; load(); });
        document.getElementById('next-btn')?.addEventListener('click', () => { currentPage++; load(); });

        if (isAdmin) {
          document.querySelectorAll('.btn-danger').forEach(btn => {
            btn.addEventListener('click', async () => {
              if (!confirm(`Delete "${btn.dataset.name}"?`)) return;
              try {
                await API.deleteProfile(btn.dataset.id);
                showAlert('Profile deleted.', 'success');
                load();
              } catch (e) { showAlert(e.message, 'error'); }
            });
          });
        }
      } catch (e) {
        document.getElementById('table-wrap').innerHTML = `<p class="empty">${e.message}</p>`;
      }
    }

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
      setTimeout(() => el.innerHTML = '', 4000);
    }

    document.getElementById('apply-btn').addEventListener('click', () => { currentPage = 1; load(); });
    document.getElementById('reset-btn').addEventListener('click', () => {
      ['f-gender','f-age-group','f-country'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('f-sort').value = 'created_at';
      document.getElementById('f-order').value = 'desc';
      document.getElementById('f-limit').value = '10';
      currentPage = 1;
      load();
    });
    document.getElementById('export-btn').addEventListener('click', () => {
      const filters = getFilters();
      Object.keys(filters).forEach(k => !filters[k] && delete filters[k]);
      API.exportCSV(filters);
    });

    load();
  </script>
</body>
</html>
